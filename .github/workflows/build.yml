name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk
          pip install briefcase
      
      - name: Create project
        run: |
          mkdir -p Klayines/src/Klayines
          cp main.py Klayines/src/Klayines/__main__.py
          
          cat > Klayines/pyproject.toml << 'TOML'
          [project]
          name = "Klayines"
          version = "1.0"
          license = "MIT"
          
          [build-system]
          requires = ["briefcase"]
          
          [tool.briefcase]
          project_name = "Klayines"
          bundle = "com.klayines"
          
          [tool.briefcase.app.Klayines]
          formal_name = "Klayines"
          description = "P2P Messenger"
          sources = ["src/Klayines"]
          requires = ["flask", "requests"]
          
          [tool.briefcase.app.Klayines.android]
          runtime_version = "3.10"
          TOML
      
      - name: Build APK
        run: |
          cd Klayines
          briefcase create android 2>&1 || true
          briefcase build android 2>&1 || true
          briefcase package android 2>&1 || true
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Klayines-APK
          path: |
            **/*.apk
            **/*.aab
