name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk python3-pip
          pip install briefcase
      
      - name: Create project structure
        run: |
          mkdir -p Klayines/src/Klayines
          cp main.py Klayines/src/Klayines/
          
          cat > Klayines/pyproject.toml << 'EOF'
          [project]
          name = "Klayines"
          version = "1.0"
          
          [build-system]
          requires = ["briefcase"]
          
          [tool.briefcase]
          project_name = "Klayines"
          bundle = "com.klayines"
          
          [tool.briefcase.app.Klayines]
          formal_name = "Klayines"
          requires = ["flask", "requests"]
          sources = ["src/Klayines"]
          EOF
      
      - name: Build Android
        run: |
          cd Klayines
          echo "y" | briefcase create android
          echo "y" | briefcase build android
          echo "y" | briefcase package android
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Klayines-APK
          path: |
            **/*.apk
            **/*.aab
